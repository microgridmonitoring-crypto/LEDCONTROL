<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32-S3 Secure Cloud Control</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; background-color: #f4f4f9; }
        .btn { padding: 15px 30px; font-size: 18px; cursor: pointer; border: none; border-radius: 5px; color: white; font-weight: bold; transition: background 0.2s; }
        .on { background-color: #2ec4b6; }
        .off { background-color: #e71d36; }
        #status { margin-top: 20px; font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <h2>ESP32-S3 Output Control Dashboard</h2>
    <button id="ctrlBtn" class="btn off" disabled>Connecting...</button>
    <div id="status">Authenticating...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        // IMPORT: Added the Firebase Authentication modules
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAni5pmTKQb4omKBP3ohS8LdIJ7nelv--c",
            authDomain: "led-f92a7.firebaseapp.com",
            databaseURL: "https://led-f92a7-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "led-f92a7",
            storageBucket: "led-f92a7.firebasestorage.app",
            messagingSenderId: "234514052081",
            appId: "1:234514052081:web:401a2c946b4538b34dca50"
        };

        // Initialize Firebase instances
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        
        const statusRef = ref(db, 'led_status');
        const btn = document.getElementById('ctrlBtn');
        const statusDiv = document.getElementById('status');
        let currentState = 0;

        // Perform the Anonymous Login
        signInAnonymously(auth)
            .then(() => {
                console.log("Logged in anonymously successfully!");
                btn.removeAttribute('disabled'); // Enable button once authenticated
                
                // Start listening to the database changes only AFTER successful login
                onValue(statusRef, (snapshot) => {
                    currentState = snapshot.exists() ? snapshot.val() : 0; 
                    
                    if (currentState === 1) {
                        btn.innerText = "Turn OFF";
                        btn.className = "btn off";
                        statusDiv.innerText = "Current State: ON";
                        statusDiv.style.color = "#2ec4b6";
                    } else {
                        btn.innerText = "Turn ON";
                        btn.className = "btn on";
                        statusDiv.innerText = "Current State: OFF";
                        statusDiv.style.color = "#e71d36";
                    }
                });
            })
            .catch((error) => {
                console.error("Authentication failed:", error);
                statusDiv.innerText = "Authentication Error!";
                statusDiv.style.color = "#e71d36";
            });

        // Toggle state in database on button click
        btn.addEventListener('click', () => {
            const nextState = currentState === 1 ? 0 : 1;
            set(statusRef, nextState);
        });
    </script>
</body>
</html>
