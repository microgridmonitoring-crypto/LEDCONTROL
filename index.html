<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32-S3 Cloud Control</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; background-color: #f4f4f9; }
        .btn { padding: 15px 30px; font-size: 18px; cursor: pointer; border: none; border-radius: 5px; color: white; font-weight: bold; }
        .on { background-color: #2ec4b6; }
        .off { background-color: #e71d36; }
        #status { margin-top: 20px; font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <h2>ESP32-S3 Output Control Dashboard</h2>
    <button id="ctrlBtn" class="btn off">Turn ON</button>
    <div id="status">Current State: Loading...</div>

   <script type="module">
  	// Import the functions you need from the SDKs you need
 	 import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
 	 import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-analytics.js";
  	// TODO: Add SDKs for Firebase products that you want to use
  	// https://firebase.google.com/docs/web/setup#available-libraries

  	// Your web app's Firebase configuration
  	// For Firebase JS SDK v7.20.0 and later, measurementId is optional
  	const firebaseConfig = {
   	 apiKey: "AIzaSyAni5pmTKQb4omKBP3ohS8LdIJ7nelv--c",
   	 authDomain: "led-f92a7.firebaseapp.com",
   	 projectId: "led-f92a7",
   	 storageBucket: "led-f92a7.firebasestorage.app",
   	 messagingSenderId: "234514052081",
   	 appId: "1:234514052081:web:401a2c946b4538b34dca50",
   	 measurementId: "G-M4RPVET8FM"
  	};

  // Initialize Firebase
  	const app = initializeApp(firebaseConfig);
  	const analytics = getAnalytics(app);
        const statusRef = ref(db, 'led_status');

        const btn = document.getElementById('ctrlBtn');
        const statusDiv = document.getElementById('status');
        let currentState = 0;

        // Listen for live updates from Firebase to change UI state instantly
        onValue(statusRef, (snapshot) => {
            currentState = snapshot.val();
            if (currentState === 1) {
                btn.innerText = "Turn OFF";
                btn.className = "btn off";
                statusDiv.innerText = "Current State: ON";
                statusDiv.style.color = "#2ec4b6";
            } else {
                btn.innerText = "Turn ON";
                btn.className = "btn on";
                statusDiv.innerText = "Current State: OFF";
                statusDiv.style.color = "#e71d36";
            }
        });

        // Toggle state in database on button click
        btn.addEventListener('click', () => {
            const nextState = currentState === 1 ? 0 : 1;
            set(statusRef, nextState);
        });
    </script>
</body>
</html>
