<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud LED Control</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 80px; background-color: #f4f4f9; }
        .btn { padding: 20px 40px; font-size: 20px; cursor: pointer; border: none; border-radius: 8px; color: white; font-weight: bold; transition: 0.2s; }
        .on { background-color: #2ec4b6; }
        .off { background-color: #e71d36; }
        #status { margin-top: 25px; font-size: 22px; font-weight: bold; }
    </style>
</head>
<body>

    <h2>IoT Web Control Dashboard</h2>
    <button id="ctrlBtn" class="btn off" disabled>Connecting to Cloud...</button>
    <div id="status">Authenticating...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

       
  // Import the functions you need from the SDKs you need
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-analytics.js";
  // TODO: Add SDKs for Firebase products that you want to use
  // https://firebase.google.com/docs/web/setup#available-libraries

  // Your web app's Firebase configuration
  // For Firebase JS SDK v7.20.0 and later, measurementId is optional
  const firebaseConfig = {
    apiKey: "AIzaSyAni5pmTKQb4omKBP3ohS8LdIJ7nelv--c",
    authDomain: "led-f92a7.firebaseapp.com",
    databaseURL: "https://led-f92a7-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "led-f92a7",
    storageBucket: "led-f92a7.firebasestorage.app",
    messagingSenderId: "234514052081",
    appId: "1:234514052081:web:401a2c946b4538b34dca50",
    measurementId: "G-M4RPVET8FM"
  };

  // Initialize Firebase
      const app = initializeApp(firebaseConfig);
      const analytics = getAnalytics(app);
            
        const db = getDatabase(app);
        const auth = getAuth(app);
        
        const statusRef = ref(db, 'led_status');
        const btn = document.getElementById('ctrlBtn');
        const statusDiv = document.getElementById('status');
        let currentState = 0;

        signInAnonymously(auth).then(() => {
            btn.removeAttribute('disabled');
            
            // Listen for state changes from Firebase to keep the UI synchronized
            onValue(statusRef, (snapshot) => {
                currentState = snapshot.exists() ? snapshot.val() : 0; 
                if (currentState === 1) {
                    btn.innerText = "Turn OFF";
                    btn.className = "btn off";
                    statusDiv.innerText = "Current Hardware State: ON";
                    statusDiv.style.color = "#2ec4b6";
                } else {
                    btn.innerText = "Turn ON";
                    btn.className = "btn on";
                    statusDiv.innerText = "Current Hardware State: OFF";
                    statusDiv.style.color = "#e71d36";
                }
            });
        });

        // Write pure integers to Firebase on click execution
        btn.addEventListener('click', () => {
            set(statusRef, currentState === 1 ? 0 : 1);
        });
    </script>
</body>
</html>
